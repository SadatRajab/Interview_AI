<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-container animate-fade-in" (click)="$event.stopPropagation()">
    
    <!-- Modal Header -->
    <div class="modal-header">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 9v2m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
      </div>
      <h2>{{ lang.text().INST_TITLE }}</h2>
      <p class="modal-subtitle">{{ lang.text().INST_SUBTITLE }}</p>
    </div>

    <!-- Instructions List -->
    <div class="modal-body">
      <ul class="instructions-list">
        <li>
          <div class="instruction-icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <span>{{ lang.text().INST_RULE_1 }}</span>
        </li>
        <li>
          <div class="instruction-icon-svg color-warn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
          </div>
          <span>{{ lang.text().INST_RULE_2 }}</span>
        </li>
        <li>
          <div class="instruction-icon-svg color-info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <span>{{ lang.text().INST_RULE_3 }}</span>
        </li>
        <li>
          <div class="instruction-icon-svg color-danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="15" y1="9" x2="9" y2="15"/>
              <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
          </div>
          <span>{{ lang.text().INST_RULE_4 }}</span>
        </li>
        <li>
          <div class="instruction-icon-svg color-danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
          <span>{{ lang.text().INST_RULE_5 }}</span>
        </li>
        <li>
          <div class="instruction-icon-svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <span>{{ lang.text().INST_RULE_6 }}</span>
        </li>
      </ul>

      <!-- Agreement Checkbox -->
      <label class="agreement-checkbox">
        <input
          type="checkbox"
          [checked]="agreed()"
          (change)="agreed.set(!agreed())"
        />
        <span class="checkbox-custom"></span>
        <span class="agreement-text">{{ lang.text().INST_CHECKBOX }}</span>
      </label>
    </div>

    <!-- Modal Actions -->
    <div class="modal-actions">
      <button class="btn btn-secondary" (click)="onCancel()">{{ lang.text().CANCEL }}</button>
      <button 
        class="btn btn-primary"
        [disabled]="!agreed()"
        (click)="onConfirm()"
      >
        {{ lang.text().START_INTERVIEW }}
      </button>
    </div>
  </div>
</div>
